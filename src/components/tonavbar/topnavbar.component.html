<div
  class="flex items-center justify-between border-b border-slate-600 bg-slate-900 px-6 py-1.5 text-xs text-slate-100 md:text-[13px]"
>
  <!-- left -->
  <div class="flex items-center gap-3 md:gap-4">
    <span
      class="flex h-5 w-5 items-center justify-center rounded-full bg-emerald-500/10 text-[10px] text-emerald-400"
    >
      <i class="fas fa-gift"></i>
    </span>
    <span class="whitespace-nowrap">Free Shipping on Orders 500 EGP</span>

    <span class="hidden h-4 w-px bg-slate-500 md:block"></span>

    <span
      class="hidden h-5 w-5 items-center justify-center rounded-full bg-emerald-500/10 text-[10px] text-emerald-400 md:flex"
    >
      <i class="fas fa-box-open"></i>
    </span>
    <span class="hidden whitespace-nowrap md:inline-block">New Arrivals Daily</span>
  </div>

  <!-- right -->
  <div class="flex items-center gap-3 text-[11px] md:gap-4">
    <a
      href="tel:+18001234567"
      class="inline-flex items-center gap-1 text-slate-200 hover:text-emerald-400"
    >
      <i class="fas fa-phone-alt text-[10px]"></i>
      <span class="hidden sm:inline-block">+1 (800) 123-4567</span>
    </a>

    <span class="hidden h-4 w-px bg-slate-500 md:block"></span>

    <a
      href="mailto:support@freshcart.com"
      class="hidden items-center gap-1 text-slate-200 hover:text-emerald-400 md:inline-flex"
    >
      <i class="far fa-envelope text-[10px]"></i>
      <span>support@freshcart.com</span>
    </a>

    <span class="hidden h-4 w-px bg-slate-500 lg:block"></span>
    @if (isLoggedin()) {
      <span>{{ user()?.name }}</span>
      <span>{{ user()?.email }}</span>
    } @else {
      <a
        routerLink="/login"
        routerLinkActive="text-emerald-400"
        class="inline-flex items-center gap-1 font-medium text-slate-100 hover:text-emerald-400"
      >
        <span>Sign In</span>
      </a>
      <a
        routerLink="/register"
        routerLinkActive="text-emerald-400"
        class="inline-flex items-center gap-1 font-medium text-slate-100 hover:text-emerald-400"
      >
        <span>Sign Up</span>
      </a>
    }
  </div>
</div>
